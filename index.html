<!DOCTYPE html>
<html>
<head>
    <title>Leo's Archives</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="font-family: 'Roboto', sans-serif; font-weight: 900; font-size: 60px; text-align: center; -webkit-text-stroke: 1.5px black;">
        Leo's Archives
    </h1>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-bar" placeholder="Surf the web...">
        <div id="results" class="search-results"></div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');
        let pages = [];

        fetch('pages.json')
            .then(response => response.json())
            .then(data => {
                pages = data;
            })
            .catch(error => console.log('pages.json not found'));

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            resultsDiv.innerHTML = '';

            if (query.length === 0) {
                resultsDiv.style.display = 'none';
                return;
            }

            const filtered = pages.filter(page => 
                page.name.toLowerCase().includes(query)
            );

            if (filtered.length > 0) {
                resultsDiv.style.display = 'block';
                filtered.forEach(page => {
                    const link = document.createElement('a');
                    link.href = page.url;
                    link.textContent = page.name;
                    link.className = 'result-item';
                    resultsDiv.appendChild(link);
                });
            } else if (query.length > 0) {
                resultsDiv.style.display = 'block';
                const noResults = document.createElement('div');
                noResults.className = 'no-results';
                noResults.textContent = 'No pages found';
                resultsDiv.appendChild(noResults);
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                resultsDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
